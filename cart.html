<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://use.fontawesome.com/be1ba39dfe.js"></script>
    <link rel="stylesheet" href="./css/style.css">
    <title>Shopping Cart - BookZone</title>
    <style>
        .cart-container {
            max-width: 1200px;
            margin: 80px auto 40px;
            padding: 20px;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(0, 255, 185, 0.3);
            padding-bottom: 20px;
        }

        .cart-header h1 {
            font-size: 32px;
            color: #e8f6ff;
            margin: 0;
        }

        .cart-header-actions {
            display: flex;
            gap: 10px;
        }

        .cart-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .cart-items-section {
            background: rgba(30, 60, 90, 0.3);
            border: 1px solid rgba(0, 255, 185, 0.15);
            border-radius: 10px;
            padding: 20px;
        }

        .cart-empty {
            text-align: center;
            padding: 60px 20px;
            color: #b8d0ff;
        }

        .cart-empty i {
            font-size: 64px;
            color: rgba(0, 255, 185, 0.3);
            margin-bottom: 20px;
        }

        .cart-empty p {
            font-size: 18px;
            margin: 10px 0;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 100px 1fr 120px 80px 50px;
            gap: 20px;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 3px solid rgba(0, 255, 185, 0.3);
            transition: all 0.3s ease;
        }

        .cart-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-left-color: #00ffb9;
        }

        .cart-item-img {
            width: 100px;
            height: 140px;
            object-fit: cover;
            border-radius: 6px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .cart-item-details {
            display: flex;
            flex-direction: column;
        }

        .cart-item-title {
            color: #e8f6ff;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .cart-item-price {
            color: #22c55e;
            font-weight: 700;
            font-size: 18px;
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-btn {
            background: #22c55e;
            border: 1px solid #22c55e;
            color: #062031;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover {
            background: #22c55e;
            border-color: #22c55e;
        }

        .qty-input {
            width: 40px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 185, 0.2);
            color: #e8f6ff;
            padding: 4px;
            border-radius: 4px;
            font-size: 14px;
        }

        .cart-item-subtotal {
            text-align: right;
            color: #e8f6ff;
            font-weight: 600;
            font-size: 16px;
        }

        .cart-item-remove {
            background: #22c55e;
            border: 1px solid #22c55e;
            color: #062031;
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-item-remove:hover {
            background: #22c55e;
            border-color: #22c55e;
        }

        .cart-summary {
            background: rgba(30, 60, 90, 0.3);
            border: 1px solid rgba(0, 255, 185, 0.15);
            border-radius: 10px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #b8d0ff;
            font-size: 14px;
        }

        .summary-row.total {
            border-top: 2px solid rgba(0, 255, 185, 0.2);
            padding-top: 12px;
            margin-top: 12px;
            font-size: 18px;
            font-weight: 700;
            color: #22c55e;
        }

        .summary-value {
            font-weight: 600;
        }

        .checkout-btn {
            width: 100%;
            background: #22c55e;
            color: #062031;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 255, 185, 0.3);
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 255, 185, 0.4);
        }

        .checkout-btn:disabled {
            background: #22c55e;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .continue-shopping {
            width: 100%;
            background: #22c55e;
            color: #062031;
            border: 1px solid #22c55e;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 10px;
        }

        .continue-shopping:hover {
            background: #22c55e;
            border-color: #22c55e;
        }

        @media (max-width: 768px) {
            .cart-content {
                grid-template-columns: 1fr;
            }

            .cart-item {
                grid-template-columns: 80px 1fr 40px;
                gap: 12px;
            }

            .cart-item-qty,
            .cart-item-subtotal {
                display: none;
            }

            .cart-summary {
                position: static;
                top: auto;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="brand-name">
                <img src="./images/Screenshot 2026-03-29 010458.png" alt="BookZone Logo" class="nav-logo">
                <img src="./images/Screenshot 2026-03-29 010651.png" alt="BookZone" class="nav-text-image">
            </a>
        </div>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="About.html">About</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="Register.html">Signup</a></li>
            </ul>
        </div>

        <!-- Search Bar -->
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Search books..." id="searchInput" aria-label="Search books">
            <button class="search-btn" aria-label="Search">
                <i class="fa fa-search" aria-hidden="true"></i>
            </button>
        </div>

        <!-- Cart icon with count on right side -->
        <div class="nav-cart">
            <button class="cart-btn" aria-label="View cart">
                <i class="fa fa-shopping-cart" aria-hidden="true"></i>
                <span class="cart-count">0</span>
            </button>
        </div>
    </nav>

    <div class="cart-container">
        <div class="cart-header">
            <h1><i class="fa fa-shopping-cart" aria-hidden="true"></i> Shopping Cart</h1>
            <div class="cart-header-actions">
                <a href="products.html" class="btn">Continue Shopping</a>
            </div>
        </div>

        <div class="cart-content">
            <!-- Cart Items -->
            <div class="cart-items-section">
                <div id="cartItems" class="cart-items-container">
                    <!-- Items will be populated here by JavaScript -->
                </div>
            </div>

            <!-- Cart Summary -->
            <div class="cart-summary">
                <h3 style="color: #e8f6ff; margin-top: 0;">Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span class="summary-value" id="subtotal">₹0</span>
                </div>
                <div class="summary-row">
                    <span>Shipping:</span>
                    <span class="summary-value">Free</span>
                </div>
                <div class="summary-row">
                    <span>Tax:</span>
                    <span class="summary-value" id="tax">₹0</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">₹0</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">Proceed to Checkout</button>
                <a href="products.html" class="continue-shopping">Continue Shopping</a>
            </div>
        </div>
    </div>

    <script src="./js/cart.js"></script>
    <script src="./js/search.js"></script>

    <script>
        // Load and display cart items
        function loadCartPage() {
            const cart = loadCart();
            const cartItemsContainer = document.getElementById('cartItems');

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `
                    <div class="cart-empty">
                        <i class="fa fa-shopping-cart" aria-hidden="true"></i>
                        <p>Your cart is empty</p>
                        <p style="color: #22c55e; cursor: pointer;" onclick="window.location.href='products.html'">
                            Add books to get started →
                        </p>
                    </div>
                `;
                document.getElementById('checkoutBtn').disabled = true;
                return;
            }

            // Display cart items
            cartItemsContainer.innerHTML = '';
            cart.forEach((item, index) => {
                const itemTotal = Number(item.price) * (item.qty || 1);
                const cartItem = document.createElement('div');
                cartItem.className = 'cart-item';
                cartItem.innerHTML = `
                    <img src="${item.img}" alt="${item.title}" class="cart-item-img">
                    <div class="cart-item-details">
                        <div class="cart-item-title">${item.title}</div>
                        <div class="cart-item-price">₹${Number(item.price)}</div>
                    </div>
                    <div class="cart-item-qty">
                        <button class="qty-btn" onclick="updateQty(${index}, -1)">−</button>
                        <input type="number" class="qty-input" value="${item.qty || 1}" readonly>
                        <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                    </div>
                    <div class="cart-item-subtotal">₹${itemTotal}</div>
                    <button class="cart-item-remove" onclick="removeFromCart(${index})" title="Remove item">
                        <i class="fa fa-trash" aria-hidden="true"></i>
                    </button>
                `;
                cartItemsContainer.appendChild(cartItem);
            });

            updateCartSummary();
        }

        // Update quantity
        function updateQty(index, change) {
            const cart = loadCart();
            const newQty = (cart[index].qty || 1) + change;

            if (newQty < 1) {
                removeFromCart(index);
                return;
            }

            cart[index].qty = newQty;
            saveCart(cart);
            renderCartCount();
            loadCartPage();
        }

        // Remove item from cart
        function removeFromCart(index) {
            const cart = loadCart();
            cart.splice(index, 1);
            saveCart(cart);
            renderCartCount();
            loadCartPage();
        }

        // Update cart summary
        function updateCartSummary() {
            const cart = loadCart();
            const subtotal = getTotal(cart);
            const tax = Math.round(subtotal * 0.05); // 5% tax
            const total = subtotal + tax;

            document.getElementById('subtotal').textContent = '₹' + subtotal;
            document.getElementById('tax').textContent = '₹' + tax;
            document.getElementById('total').textContent = '₹' + total;
        }

        // Checkout
        function checkout() {
            const cart = loadCart();
            if (cart.length === 0) {
                alert('Your cart is empty');
                return;
            }

            const total = getTotal(cart) + Math.round(getTotal(cart) * 0.05);
            alert('✓ Order Placed Successfully!\n\nTotal Amount: ₹' + total + '\n\nThank you for shopping with BookZone!');
            
            // Clear cart
            localStorage.removeItem('ebookstore_cart_v1');
            renderCartCount();
            
            // Redirect to home
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        }

        // Initialize cart page
        document.addEventListener('DOMContentLoaded', function() {
            loadCartPage();
            renderCartCount();
        });
    </script>
</body>
</html>
