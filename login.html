<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  <title>Login - BookZone</title>
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="brand-name">
        <img src="./images/Screenshot 2026-03-29 010458.png" alt="BookZone Logo" class="nav-logo">
        <img src="./images/Screenshot 2026-03-29 010651.png" alt="BookZone" class="nav-text-image">
      </a>
    </div>
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="About.html">About</a></li>
        <li><a href="login.html" class="active">Login</a></li>
        <li><a href="Register.html">Signup</a></li>
      </ul>
    </div>

    <!-- Cart icon with count on right side -->
    <div class="nav-cart">
        <button class="cart-btn" aria-label="View cart" onclick="window.location.href='cart.html'" style="cursor: pointer;">
            <i class="fa fa-shopping-cart" aria-hidden="true"></i>
            <span class="cart-count">0</span>
        </button>
    </div>
  </nav>
    <div class="login-page">
      <div class="form">
        <div class="login">
          <div class="login-header">
            <h3 style="color: antiquewhite;">LOG IN</h3>
            <p style="color: antiquewhite;">Please enter your credentials to login.</p>
          </div>
        </div>
        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
          <input type="text" id="loginUsername" placeholder="username" required/>
          <input type="password" id="loginPassword" placeholder="password" required/>
          <button type="submit">Login</button>
          <p class="message">Not registered? <a href="Register.html">Signup</a> here</p>
        </form>
      </div>
    </div>

    <script src="./js/cart.js"></script>
    <script src="./js/search.js"></script>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            // Basic validation
            if (!username || !password) {
                alert('Please enter username and password');
                return;
            }
            
            // Show success popup
            alert('✓ You are successfully logged in!\n\nWelcome, ' + username + '!\n\nRedirecting to home page...');
            
            // Redirect to home page
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        }
    </script>

</body>
</body>
</html>
